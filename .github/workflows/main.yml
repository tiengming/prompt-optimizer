name: Push Static Web to dist-pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-static:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🧶 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🛠️ Build all packages
        run: pnpm -r build
        
      - name: 🚀 Deploy dist to dist-pages branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin
          git switch --orphan dist-pages
          git rm -rf .
          cp -r packages/web/dist/* .
          touch .nojekyll  # optional, if needed
          git add .
          git commit -m "Deploy latest static build [skip ci]"
          git push --force origin dist-pages
