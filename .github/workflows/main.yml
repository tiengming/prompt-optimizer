name: Push Static Web to dist-pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-static:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🧶 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🛠️ Build all packages
        run: pnpm -r build
        
      - name: 🚀 Deploy dist to dist-pages branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin
          git reset --hard HEAD
      
          # ✅ 先确认构建产物存在
          if [ ! -d "packages/web/dist" ]; then
            echo "❌ 构建产物不存在，跳过部署"
            exit 1
          fi
      
          git switch --orphan dist-pages
          git rm -rf .
      
          # ✅ 检查是否复制成功
          cp -a packages/web/dist/* . || {
            echo "❌ 复制构建产物失败"
            exit 1
          }
      
          touch .nojekyll
      
          # ✅ 确认当前目录下确实有文件再 git add
          if [ -z "$(ls -A)" ]; then
            echo "❌ 当前工作目录为空，终止部署"
            exit 1
          fi
      
          git add .
          git commit -m "Deploy latest static build [skip ci]"
          git push --force origin dist-pages

